            function handleTouchEnd() {
                isDragging = false;
                document.removeEventListener('touchmove', handleTouchMove);
                document.removeEventListener('touchend', handleTouchEnd);
            }
        }

        function executeDownload() {
            toggleModal(false);
            canvas.discardActiveObject();

            // 获取导出质量设置
            const qualityValue = parseInt(document.getElementById('exportQuality').value);
            const quality = qualityValue / 100;
            const format = qualityValue === 100 ? 'png' : 'jpeg'; // 100%品质时使用PNG，否则使用JPEG

            const originalVpt = canvas.viewportTransform;
            const originalWidth = canvas.getWidth();
            const originalHeight = canvas.getHeight();

            if (bgImage) {
                canvas.setWidth(bgImage.width);
                canvas.setHeight(bgImage.height);
                canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            } else {
                canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            }

            // PNG格式使用无损压缩（quality参数无效），JPEG使用指定质量
            const exportOptions = {
                format: format,
                multiplier: 1
            };
            if (format === 'jpeg') {
                exportOptions.quality = quality;
            }

            const dataURL = canvas.toDataURL(exportOptions);

            canvas.setWidth(originalWidth);
            canvas.setHeight(originalHeight);
            canvas.setViewportTransform(originalVpt);
            canvas.requestRenderAll();

            const a = document.createElement('a');
            a.download = `cover_${Date.now()}.${format === 'jpeg' ? 'jpg' : 'png'}`;
            a.href = dataURL;
            a.click();

            const formatText = format.toUpperCase();
            const qualityText = format === 'png' ? '无损品质' : `${qualityValue}% 品质`;
            showToast(`已导出 ${formatText} 格式 (${qualityText}) 图片`);
        }

        function resetAll() {
            if (!confirm("确定要重置所有内容吗？这将清除已上传的底图、轨迹数据以及所有文字和标记。")) {
                return;
            }

            // 清除画布上的所有对象
            canvas.clear();

            // 重置全局变量
            rawPoints = [];
            simplifiedPoints = [];
            trackBounds = {};
            trackStats = {};
            bgImage = null;

            // 重置视口变换
            canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);

            // 清除选择状态
            canvas.discardActiveObject();
            selectionHistory = [];

            // 重置历史记录
            historyManager.history = [];
            historyManager.index = -1;
            historyManager.save();

            // 清除数据库中的自动保存状态
            idb.put('latest', null).catch(e => console.error('Clear DB failed', e));

            // 隐藏浮动菜单
            hideFloatMenu();

            // 重新渲染画布
            canvas.requestRenderAll();

            showToast("已重置所有内容");
        }

        const floatMenu = document.getElementById('floatingMenu');
        const alignSubmenu = document.getElementById('ft-align-submenu');

        canvas.on('selection:created', updateFloatMenu);
        canvas.on('selection:updated', updateFloatMenu);
        canvas.on('selection:cleared', hideFloatMenu);
        canvas.on('object:moving', updateFloatMenuPosition);
        canvas.on('object:scaling', updateFloatMenuPosition);
        canvas.on('mouse:move', () => { if (isPanning) updateFloatMenuPosition(); });

        function hideFloatMenu() { if (isInternalUpdate) return; if (floatMenu) floatMenu.classList.add('hidden'); if (alignSubmenu) alignSubmenu.classList.add('hidden'); }

        function updateFloatMenu() {
            const active = canvas.getActiveObject();
            if (!active) { hideFloatMenu(); return; }
            floatMenu.classList.remove('hidden');
            updateFloatMenuPosition();
            let selectedObjects = [];
            if (active.type === 'activeSelection') { selectedObjects = active.getObjects(); } else { selectedObjects = [active]; }
            const hasTrack = selectedObjects.some(o => o.id === 'track_group');
            const isTrackOnly = hasTrack && selectedObjects.length === 1;
            const isAllText = !hasTrack && selectedObjects.every(o => o.type === 'i-text' || o.type === 'text');
            const isAllMarker = !hasTrack && selectedObjects.every(o => o.type === 'circle');
            const isMulti = active.type === 'activeSelection';
            const isGroup = active.type === 'group';
            const textTools = document.getElementById('ft-text-tools');
            const markerTools = document.getElementById('ft-marker-tools');
            const trackTools = document.getElementById('ft-track-tools');
            const multiTools = document.getElementById('ft-multi-tools');
            const groupBtnText = document.querySelector('#ft-group-btn span');
            const alignBtn = document.getElementById('ft-align-btn');

            if (isTrackOnly) {
                trackTools.classList.remove('hidden'); textTools.classList.add('hidden'); markerTools.classList.add('hidden'); multiTools.classList.add('hidden');
                document.getElementById('ft-track-width').value = document.getElementById('strokeWidth').value;
                document.getElementById('ft-track-point').value = document.getElementById('pointSize').value;
                const currentMode = document.getElementById('colorMode').value;
                document.getElementById('ft-track-mode').value = currentMode;
                const colorContainer = document.getElementById('ft-track-solid-color-container');
                if (currentMode === 'solid') { colorContainer.classList.remove('hidden'); } else { colorContainer.classList.add('hidden'); }
                const solidColor = document.getElementById('trackSolidColor').value;
                document.getElementById('ft-track-solid-color-preview').style.backgroundColor = solidColor;
                const trackObj = selectedObjects[0];
                document.getElementById('ft-track-shadow').classList.toggle('bg-slate-200', !!trackObj.shadow);
            } else if (isAllText) {
                trackTools.classList.add('hidden'); markerTools.classList.add('hidden'); textTools.classList.remove('hidden');
                const ref = selectedObjects[0];
                document.getElementById('ft-fontSize').value = ref.fontSize || 40;
                document.getElementById('ft-color-preview').style.backgroundColor = ref.fill;
                const currentFont = ref.fontFamily;
                const fontSelect = document.getElementById('ft-fontFamily');
                fontSelect.value = currentFont;
                if (!fontSelect.value) {
                    if (currentFont.includes('DingTalk JinBuTi') || currentFont.includes('钉钉进步体')) fontSelect.value = 'DingTalk JinBuTi';
                    else if (currentFont.includes('Noto Sans')) fontSelect.value = 'Noto Sans SC';
                    else if (currentFont.includes('system-ui')) fontSelect.value = 'system-ui';
                    else fontSelect.value = 'DingTalk JinBuTi'; // 默认使用钉钉进步体
                }
                document.getElementById('ft-bold').classList.toggle('bg-slate-200', ref.fontWeight === 'bold');
                document.getElementById('ft-italic').classList.toggle('bg-slate-200', ref.fontStyle === 'italic');
                const hasStroke = ref.stroke && ref.strokeWidth > 0;
                document.getElementById('ft-stroke').classList.toggle('bg-slate-200', hasStroke);
                document.getElementById('ft-text-stroke-width').value = hasStroke ? ref.strokeWidth : 2;
                const strokeColor = ref.stroke || '#000000';
                document.getElementById('ft-text-stroke-preview').style.backgroundColor = strokeColor;
                document.getElementById('ft-text-shadow').classList.toggle('bg-slate-200', !!ref.shadow);
                if (selectedObjects.length > 1 || isGroup) {
                    multiTools.classList.remove('hidden');
                    if (isGroup) { groupBtnText.innerText = "解组"; alignBtn.classList.add('hidden'); } else { groupBtnText.innerText = "成组"; alignBtn.classList.remove('hidden'); }
                } else { multiTools.classList.add('hidden'); }
            } else if (isAllMarker) {
                trackTools.classList.add('hidden'); textTools.classList.add('hidden'); markerTools.classList.remove('hidden');
                const ref = selectedObjects[0];
                document.getElementById('ft-marker-fill-preview').style.backgroundColor = ref.fill;
                document.getElementById('ft-marker-stroke-preview').style.backgroundColor = ref.stroke;
                document.getElementById('ft-marker-width').value = ref.strokeWidth || 0;
                document.getElementById('ft-marker-shadow').classList.toggle('bg-slate-200', !!ref.shadow);
                if (selectedObjects.length > 1 || isGroup) {
                    multiTools.classList.remove('hidden');
                    if (isGroup) { groupBtnText.innerText = "解组"; alignBtn.classList.add('hidden'); } else { groupBtnText.innerText = "成组"; alignBtn.classList.remove('hidden'); }
                } else { multiTools.classList.add('hidden'); }
            } else {
                trackTools.classList.add('hidden'); textTools.classList.add('hidden'); markerTools.classList.add('hidden');
                if (selectedObjects.length > 1 || isGroup) {
                    multiTools.classList.remove('hidden');
                    if (isGroup) { groupBtnText.innerText = "解组"; alignBtn.classList.add('hidden'); } else { groupBtnText.innerText = "成组"; alignBtn.classList.remove('hidden'); }
                } else { multiTools.classList.add('hidden'); }
            }
        }

        function updateFloatMenuPosition() {
            const active = canvas.getActiveObject();
            if (!active || floatMenu.classList.contains('hidden')) return;
            const bound = active.getBoundingRect();
            let top = bound.top - 60;
            let left = bound.left + (bound.width / 2) - (floatMenu.offsetWidth / 2);
            if (top < 10) top = bound.top + bound.height + 10;
            if (left < 10) left = 10;
            const maxW = canvas.getWidth();
            if (left + floatMenu.offsetWidth > maxW) left = maxW - floatMenu.offsetWidth - 10;
            floatMenu.style.top = top + 'px';
            floatMenu.style.left = left + 'px';
        }

        function batchUpdateStyle(prop, value) {
            const active = canvas.getActiveObject();
            if (!active) return;
            if (prop === 'fontSize') value = parseInt(value);
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            objects.forEach(o => {
                if (o.type === 'i-text' || o.type === 'text') {
                    o.set(prop, value);
                    if (prop === 'stroke' && (!o.strokeWidth || o.strokeWidth === 0)) { o.set('strokeWidth', 2); }
                }
            });
            if (prop === 'fill') document.getElementById('ft-color-preview').style.backgroundColor = value;
            if (prop === 'stroke') document.getElementById('ft-text-stroke-preview').style.backgroundColor = value;
            canvas.requestRenderAll();
            historyManager.save();
        }

        function batchToggleStyle(prop, val) {
            const active = canvas.getActiveObject();
            if (!active) return;
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            const first = objects[0];
            let next;
            if (prop === 'underline') { next = !first.underline; } else { next = (first.get(prop) === val) ? 'normal' : val; }
            objects.forEach(o => { if (o.type === 'i-text' || o.type === 'text') { o.set(prop, next); } });
            if (prop === 'fontWeight') document.getElementById('ft-bold').classList.toggle('bg-slate-200', next === 'bold');
            if (prop === 'fontStyle') document.getElementById('ft-italic').classList.toggle('bg-slate-200', next === 'italic');
            if (prop === 'underline') document.getElementById('ft-underline').classList.toggle('bg-slate-200', next);
            canvas.requestRenderAll();
            historyManager.save();
        }

        function batchToggleStroke() {
            const active = canvas.getActiveObject();
            if (!active) return;
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            const first = objects[0];
            const hasStroke = first.stroke && first.strokeWidth > 0;
            objects.forEach(o => {
                if (o.type === 'i-text' || o.type === 'text') {
                    if (hasStroke) { o.set({ stroke: null, strokeWidth: 0 }); } else { o.set({ stroke: o.fill === '#000000' ? '#ffffff' : '#000000', strokeWidth: 2, paintFirst: 'stroke' }); }
                }
            });
            canvas.requestRenderAll();
            historyManager.save();
        }

        function batchUpdateMarker(prop, value) {
            const active = canvas.getActiveObject();
            if (!active) return;
            if (prop === 'strokeWidth') value = parseFloat(value);
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            objects.forEach(o => { if (o.type === 'circle') { o.set(prop, value); } });
            if (prop === 'fill') document.getElementById('ft-marker-fill-preview').style.backgroundColor = value;
            if (prop === 'stroke') document.getElementById('ft-marker-stroke-preview').style.backgroundColor = value;
            canvas.requestRenderAll();
            historyManager.save();
        }

        function syncTrackSetting(id, value) {
            const sidebarEl = document.getElementById(id);
            if (sidebarEl) sidebarEl.value = value;
            if (id === 'colorMode') {
                const pickerContainer = document.getElementById('ft-track-solid-color-container');
                if (value === 'solid') { pickerContainer.classList.remove('hidden'); document.getElementById('solidColorRow').classList.remove('hidden'); } else { pickerContainer.classList.add('hidden'); document.getElementById('solidColorRow').classList.add('hidden'); }
            }
            if (id === 'trackSolidColor') { document.getElementById('ft-track-solid-color-preview').style.backgroundColor = value; }
            if (simplifiedPoints.length) {
                isInternalUpdate = true;
                renderTrackGeometry(false);
                const newTrack = canvas.getObjects().find(o => o.id === 'track_group');
                if (newTrack) { canvas.setActiveObject(newTrack); }
                isInternalUpdate = false;
                historyManager.save();
            }
        }

        function batchUpdateStrokeWidth(width) {
            const active = canvas.getActiveObject();
            if (!active) return;
            width = parseFloat(width);
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            objects.forEach(o => {
                if (o.type === 'i-text' || o.type === 'text') {
                    if (!o.stroke) o.set('stroke', '#000000');
                    o.set('strokeWidth', width);
                }
            });
            canvas.requestRenderAll();
            historyManager.save();
        }

        function batchToggleShadow() {
            const active = canvas.getActiveObject();
            if (!active) return;
            const objects = active.type === 'activeSelection' ? active.getObjects() : [active];
            const first = objects[0];
            const hasShadow = !!first.shadow;
            const shadowConfig = { color: 'rgba(0,0,0,0.5)', blur: 10, offsetX: 5, offsetY: 5 };
            objects.forEach(o => { if (hasShadow) { o.set('shadow', null); } else { o.set('shadow', new fabric.Shadow(shadowConfig)); } });
            ['ft-text-shadow', 'ft-marker-shadow', 'ft-track-shadow'].forEach(id => { const btn = document.getElementById(id); if (btn) btn.classList.toggle('bg-slate-200', !hasShadow); });
            canvas.requestRenderAll();
            historyManager.save();
        }

        function toggleAlignMenu() { alignSubmenu.classList.toggle('hidden'); }

        function getAbsRect(obj) { return obj.getBoundingRect(true); }
        function alignObjects(mode) {
            const active = canvas.getActiveObject();
            if (!active || active.type !== 'activeSelection') return;
            const objects = active.getObjects();
            if (objects.length < 2) return;
            let refObj = objects[0];
            for (let i = 0; i < selectionHistory.length; i++) {
                const historyObj = selectionHistory[i];
                if (objects.includes(historyObj)) { refObj = historyObj; break; }
            }
            const refRect = getAbsRect(refObj);
            objects.forEach(obj => {
                if (obj === refObj) return;
                const objRect = getAbsRect(obj);
                let moveX = 0; let moveY = 0;
                switch (mode) {
                    case 'left': moveX = refRect.left - objRect.left; break;
                    case 'centerH': moveX = (refRect.left + refRect.width / 2) - (objRect.left + objRect.width / 2); break;
                    case 'right': moveX = (refRect.left + refRect.width) - (objRect.left + objRect.width); break;
                    case 'top': moveY = refRect.top - objRect.top; break;
                    case 'centerV': moveY = (refRect.top + refRect.height / 2) - (objRect.top + objRect.height / 2); break;
                    case 'bottom': moveY = (refRect.top + refRect.height) - (objRect.top + objRect.height); break;
                }
                obj.left += moveX; obj.top += moveY; obj.setCoords();
            });
            active.setCoords();
            canvas.requestRenderAll();
            historyManager.save();
            toggleAlignMenu();
        }

        function distributeObjects(axis) {
            const active = canvas.getActiveObject();
            if (!active || active.type !== 'activeSelection') return;
            const objects = active.getObjects();
            if (objects.length < 3) return;
            const list = objects.map(obj => ({ obj: obj, rect: getAbsRect(obj) }));
            if (axis === 'h') {
                list.sort((a, b) => a.rect.left - b.rect.left);
                const first = list[0].rect;
                const last = list[list.length - 1].rect;
                const minLeft = first.left;
                const maxRight = last.left + last.width;
                const totalObjectWidth = list.reduce((sum, item) => sum + item.rect.width, 0);
                const totalSpace = (maxRight - minLeft) - totalObjectWidth;
                const gap = totalSpace / (list.length - 1);
                let currentLeft = minLeft;
                list.forEach(item => { const moveX = currentLeft - item.rect.left; item.obj.left += moveX; item.obj.setCoords(); currentLeft += item.rect.width + gap; });
            } else {
                list.sort((a, b) => a.rect.top - b.rect.top);
                const first = list[0].rect;
                const last = list[list.length - 1].rect;
                const minTop = first.top;
                const maxBottom = last.top + last.height;
                const totalObjectHeight = list.reduce((sum, item) => sum + item.rect.height, 0);
                const totalSpace = (maxBottom - minTop) - totalObjectHeight;
                const gap = totalSpace / (list.length - 1);
                let currentTop = minTop;
                list.forEach(item => { const moveY = currentTop - item.rect.top; item.obj.top += moveY; item.obj.setCoords(); currentTop += item.rect.height + gap; });
            }
            active.setCoords();
            canvas.requestRenderAll();
            historyManager.save();
            toggleAlignMenu();
        }

        function toggleGroup() {
            const active = canvas.getActiveObject();
            if (!active) return;
            if (active.type === 'activeSelection') { active.toGroup(); } else if (active.type === 'group') { active.toActiveSelection(); }
            canvas.requestRenderAll();
            updateFloatMenu();
            historyManager.save();
        }

        function copyObjects() {
            const active = canvas.getActiveObject();
            if (active) { active.clone(cloned => { _clipboard = cloned; }); showToast("已复制"); }
        }

        function pasteObjects() {
            if (!_clipboard) return;
            _clipboard.clone(cloned => {
                canvas.discardActiveObject();
                cloned.set({ left: cloned.left + 20, top: cloned.top + 20, evented: true, });
                if (cloned.type === 'activeSelection') { cloned.canvas = canvas; cloned.forEachObject(obj => { canvas.add(obj); selectionHistory.push(obj); }); cloned.setCoords(); } else { canvas.add(cloned); selectionHistory.push(cloned); }
                _clipboard.top += 20; _clipboard.left += 20;
                canvas.setActiveObject(cloned);
                canvas.requestRenderAll();
                historyManager.save();
            });
        }

        window.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.code === 'KeyC') { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); copyObjects(); } }
            if ((e.ctrlKey || e.metaKey) && e.code === 'KeyV') { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); pasteObjects(); } }
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.code === 'KeyG') { e.preventDefault(); const active = canvas.getActiveObject(); if (active && active.type === 'activeSelection') { toggleGroup(); } }
            if (e.shiftKey && e.code === 'KeyG') { e.preventDefault(); const active = canvas.getActiveObject(); if (active && active.type === 'group') { toggleGroup(); } }
        });

        window.addEventListener('click', (e) => {
            const menu = document.getElementById('layoutMenu');
            const btn = document.getElementById('layoutBtn');
            if (menu && !menu.classList.contains('hidden')) { if (!menu.contains(e.target) && !btn.contains(e.target)) { toggleLayoutMenu(); } }
        });

        window.addEventListener('load', () => {
            historyManager.initFromDB();
            initTheme();
        });

        // 主题切换功能
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');

            if (body.classList.contains('light-theme')) {
                // 切换到深色主题
                body.classList.remove('light-theme');
                themeIcon.className = 'fa-solid fa-moon text-lg';
                localStorage.setItem('theme', 'dark');
                showToast('已切换到深色主题');
            } else {
                // 切换到浅色主题
                body.classList.add('light-theme');
                themeIcon.className = 'fa-solid fa-sun text-lg';
                localStorage.setItem('theme', 'light');
                showToast('已切换到浅色主题');
            }
        }

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');

            // 如果没有保存的主题，默认使用深色主题
            if (savedTheme === 'light') {
                body.classList.add('light-theme');
                themeIcon.className = 'fa-solid fa-sun text-lg';
            } else {
                body.classList.remove('light-theme');
                themeIcon.className = 'fa-solid fa-moon text-lg';
            }
        }

    </script>
</body>

</html>
